<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Copy Trading Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #3d3d5c;
        }
        
        .header h1 {
            font-size: 2.5em;
            color: #00d4ff;
            margin-bottom: 10px;
        }
        
        .metrics {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: rgba(61, 61, 92, 0.5);
            border: 1px solid #3d3d5c;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        
        .metric-label {
            font-size: 0.9em;
            color: #a0a0c0;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .metric-value {
            font-size: 1.8em;
            color: #00d4ff;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .metric-value.profit {
            color: #00ff41;
        }
        
        .metric-value.loss {
            color: #ff4141;
        }
        
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .btn-primary {
            background: #00d4ff;
            color: #1e1e2e;
        }
        
        .btn-primary:hover {
            background: #00ffff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.4);
        }
        
        .btn-danger {
            background: #ff4141;
            color: white;
        }
        
        .btn-danger:hover {
            background: #ff6060;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 65, 65, 0.4);
        }
        
        .btn-secondary {
            background: #3d3d5c;
            color: #00d4ff;
            border: 1px solid #00d4ff;
        }
        
        .btn-secondary:hover {
            background: #00d4ff;
            color: #1e1e2e;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-size: 1.5em;
            color: #00d4ff;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #3d3d5c;
        }
        
        .trades-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(45, 45, 68, 0.5);
            border-radius: 8px;
            overflow: hidden;
        }
        
        .trades-table thead {
            background: rgba(61, 61, 92, 0.8);
        }
        
        .trades-table th {
            padding: 12px;
            text-align: left;
            color: #00d4ff;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.85em;
        }
        
        .trades-table td {
            padding: 12px;
            border-top: 1px solid #3d3d5c;
        }
        
        .trades-table tr:hover {
            background: rgba(61, 61, 92, 0.4);
        }
        
        .wallet-link {
            color: #00d4ff;
            text-decoration: none;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }
        
        .wallet-link:hover {
            color: #00ffff;
            text-decoration: underline;
        }
        
        .profit-positive {
            color: #00ff41;
            font-weight: bold;
        }
        
        .profit-negative {
            color: #ff4141;
            font-weight: bold;
        }
        
        .activity-log {
            background: rgba(45, 45, 68, 0.5);
            border: 1px solid #3d3d5c;
            border-radius: 8px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }
        
        .log-entry {
            padding: 8px;
            border-bottom: 1px solid #3d3d5c;
            line-height: 1.5;
        }
        
        .log-entry:last-child {
            border-bottom: none;
        }
        
        .log-timestamp {
            color: #a0a0c0;
            margin-right: 10px;
        }
        
        .log-message {
            color: #e0e0e0;
        }
        
        .log-trade {
            color: #00d4ff;
        }
        
        .log-success {
            color: #00ff41;
        }
        
        .log-warning {
            color: #ffaa00;
        }
        
        .log-danger {
            color: #ff4141;
        }
        
        .log-error {
            color: #ff6060;
        }
        
        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
        }
        
        .status-running {
            background: rgba(0, 255, 65, 0.2);
            color: #00ff41;
        }
        
        .status-stopped {
            background: rgba(255, 65, 65, 0.2);
            color: #ff4141;
        }
        
        .wallet-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .wallet-card {
            background: rgba(61, 61, 92, 0.5);
            border: 1px solid #3d3d5c;
            border-radius: 8px;
            padding: 15px;
        }
        
        .wallet-card h4 {
            color: #00d4ff;
            margin-bottom: 10px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
        }
        
        .wallet-stat {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 0.9em;
        }
        
        .wallet-stat-label {
            color: #a0a0c0;
        }
        
        .wallet-stat-value {
            color: #00d4ff;
            font-weight: bold;
        }
        
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(61, 61, 92, 0.3);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(0, 212, 255, 0.5);
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 212, 255, 0.8);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ Polymarket Copy Trading Bot</h1>
            <p id="dataSource" style="color: #a0a0c0; margin-top: 10px;"></p>
        </div>
        
        <div class="metrics">
            <div class="metric-card">
                <div class="metric-label">Balance</div>
                <div class="metric-value" id="balance">$50.00</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Daily Profit</div>
                <div class="metric-value" id="dailyProfit">$0.00</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Total Profit</div>
                <div class="metric-value" id="totalProfit">$0.00</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Total Trades</div>
                <div class="metric-value" id="totalTrades">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Success Rate</div>
                <div class="metric-value" id="successRate">0%</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">Status</div>
                <div id="status" class="status-badge status-stopped">Stopped</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn-primary" onclick="startBot()">▶️ START</button>
            <button class="btn-danger" onclick="stopBot()">⏹ STOP</button>
            <button class="btn-secondary" onclick="resetBot()">↻ RESET</button>
            <button class="btn-secondary" onclick="scanMarkets()">🔍 SCAN</button>
        </div>
        
        <div class="section">
            <h2 class="section-title">Tracked Traders (<span id="walletCount">0</span>/10)</h2>
            <div class="wallet-list" id="walletList"></div>
        </div>
        
        <div class="section">
            <h2 class="section-title">Recent Trades</h2>
            <div style="overflow-x: auto;">
                <table class="trades-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Wallet</th>
                            <th>Market</th>
                            <th>Entry</th>
                            <th>Exit</th>
                            <th>Profit</th>
                            <th>ROI %</th>
                        </tr>
                    </thead>
                    <tbody id="tradesList"></tbody>
                </table>
            </div>
        </div>
        
        <div class="section">
            <h2 class="section-title">Activity Log</h2>
            <div class="activity-log" id="activityLog"></div>
        </div>
    </div>
    
    <script>
        let ws = null;
        let botState = {
            balance: 50,
            totalProfit: 0,
            totalTrades: 0,
            successfulTrades: 0,
            failedTrades: 0,
            trades: [],
            running: false,
            followedWallets: [],
            walletMetrics: {},
            activityLog: [],
            dataSource: 'Unknown',
            dailyProfit: 0,
        };
        
        function connectWebSocket() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}`);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'initial_state') {
                    botState = { ...botState, ...data };
                    updateDashboard();
                } else if (data.type === 'trade_executed') {
                    botState.balance = data.balance;
                    botState.totalTrades = data.totalTrades;
                    botState.totalProfit = data.totalProfit;
                    botState.successfulTrades = data.successfulTrades;
                    botState.failedTrades = data.failedTrades;
                    botState.trades.unshift(data.trade);
                    if (botState.trades.length > 20) botState.trades.pop();
                    updateDashboard();
                } else if (data.type === 'activity_log') {
                    botState.activityLog.unshift(data.entry);
                    if (botState.activityLog.length > 100) botState.activityLog.pop();
                    updateActivityLog();
                } else if (data.type === 'bot_started') {
                    botState.running = true;
                    updateDashboard();
                } else if (data.type === 'bot_stopped') {
                    botState.running = false;
                    updateDashboard();
                } else if (data.type === 'bot_reset') {
                    botState.balance = 50;
                    botState.totalProfit = 0;
                    botState.totalTrades = 0;
                    botState.successfulTrades = 0;
                    botState.failedTrades = 0;
                    botState.trades = [];
                    botState.dailyProfit = 0;
                    updateDashboard();
                } else if (data.type === 'wallet_auto_added_realtime') {
                    botState.followedWallets.push(data.wallet);
                    botState.walletMetrics[data.wallet] = {
                        trades: 0,
                        wins: 0,
                        losses: 0,
                        totalProfit: 0,
                        roiToday: data.roi,
                        winRate: data.winRate,
                    };
                    updateDashboard();
                }
            };
            
            ws.onerror = () => {
                console.error('WebSocket error');
                setTimeout(connectWebSocket, 3000);
            };
            
            ws.onclose = () => {
                console.log('WebSocket closed, reconnecting...');
                setTimeout(connectWebSocket, 3000);
            };
        }
        
        function updateDashboard() {
            // Update metrics with animation
            updateMetric('balance', `$${botState.balance.toFixed(2)}`);
            updateMetric('totalProfit', `$${botState.totalProfit.toFixed(2)}`);
            updateMetric('dailyProfit', `$${(botState.dailyProfit || 0).toFixed(2)}`);
            updateMetric('totalTrades', botState.totalTrades);
            updateMetric('successRate', botState.totalTrades > 0 
                ? ((botState.successfulTrades / botState.totalTrades) * 100).toFixed(1) + '%'
                : '0%');
            
            // Update balance color
            const balanceEl = document.getElementById('balance');
            const dailyProfitEl = document.getElementById('dailyProfit');
            const totalProfitEl = document.getElementById('totalProfit');
            
            if (botState.balance >= 50) {
                balanceEl.style.color = '#00ff41';
            } else {
                balanceEl.style.color = '#ff4141';
            }
            
            if (botState.dailyProfit >= 0) {
                dailyProfitEl.classList.add('profit');
                dailyProfitEl.classList.remove('loss');
            } else {
                dailyProfitEl.classList.add('loss');
                dailyProfitEl.classList.remove('profit');
            }
            
            if (botState.totalProfit >= 0) {
                totalProfitEl.classList.add('profit');
                totalProfitEl.classList.remove('loss');
            } else {
                totalProfitEl.classList.add('loss');
                totalProfitEl.classList.remove('profit');
            }
            
            // Update status
            const statusEl = document.getElementById('status');
            if (botState.running) {
                statusEl.textContent = '🟢 Running';
                statusEl.className = 'status-badge status-running';
            } else {
                statusEl.textContent = '🔴 Stopped';
                statusEl.className = 'status-badge status-stopped';
            }
            
            // Update data source
            document.getElementById('dataSource').textContent = `Data Source: ${botState.dataSource}`;
            
            // Update trades table
            updateTradesTable();
            
            // Update wallet list
            updateWalletList();
        }
        
        function updateMetric(id, value) {
            const el = document.getElementById(id);
            if (el && el.textContent !== value) {
                el.textContent = value;
                el.style.transform = 'scale(1.1)';
                setTimeout(() => {
                    el.style.transform = 'scale(1)';
                }, 100);
            }
        }
        
        function updateTradesTable() {
            const tbody = document.getElementById('tradesList');
            tbody.innerHTML = '';
            
            for (const trade of botState.trades.slice(0, 20)) {
                const row = document.createElement('tr');
                const profitClass = trade.profit >= 0 ? 'profit-positive' : 'profit-negative';
                const fullWallet = trade.copiedFrom.replace(/\.\.\./g, '').trim();
                
                row.innerHTML = `
                    <td>${new Date(trade.timestamp).toLocaleTimeString()}</td>
                    <td><a href="https://polymarket.com/profile/${fullWallet}" target="_blank" class="wallet-link">📊 ${trade.copiedFrom}</a></td>
                    <td>${trade.marketName || 'Market'}</td>
                    <td>$${trade.entryPrice.toFixed(4)}</td>
                    <td>$${trade.exitPrice.toFixed(4)}</td>
                    <td class="${profitClass}">${trade.profit >= 0 ? '+' : ''}$${trade.profit.toFixed(2)}</td>
                    <td class="${profitClass}">${trade.profitPercent >= 0 ? '+' : ''}${trade.profitPercent.toFixed(1)}%</td>
                `;
                tbody.appendChild(row);
            }
        }
        
        function updateWalletList() {
            const container = document.getElementById('walletList');
            container.innerHTML = '';
            document.getElementById('walletCount').textContent = botState.followedWallets.length;
            
            for (const wallet of botState.followedWallets) {
                const metrics = botState.walletMetrics[wallet] || {};
                const card = document.createElement('div');
                card.className = 'wallet-card';
                card.innerHTML = `
                    <h4>
                        <a href="https://polymarket.com/profile/${wallet}" target="_blank" class="wallet-link">
                            ${wallet.slice(0, 10)}...${wallet.slice(-8)}
                        </a>
                    </h4>
                    <div class="wallet-stat">
                        <span class="wallet-stat-label">Trades:</span>
                        <span class="wallet-stat-value">${metrics.trades || 0}</span>
                    </div>
                    <div class="wallet-stat">
                        <span class="wallet-stat-label">Wins:</span>
                        <span class="wallet-stat-value">${metrics.wins || 0}</span>
                    </div>
                    <div class="wallet-stat">
                        <span class="wallet-stat-label">Losses:</span>
                        <span class="wallet-stat-value">${metrics.losses || 0}</span>
                    </div>
                    <div class="wallet-stat">
                        <span class="wallet-stat-label">Win Rate:</span>
                        <span class="wallet-stat-value">${metrics.winRate || 0}%</span>
                    </div>
                    <div class="wallet-stat">
                        <span class="wallet-stat-label">Profit:</span>
                        <span class="wallet-stat-value">$${(metrics.totalProfit || 0).toFixed(2)}</span>
                    </div>
                `;
                container.appendChild(card);
            }
        }
        
        function updateActivityLog() {
            const logEl = document.getElementById('activityLog');
            logEl.innerHTML = '';
            
            for (const entry of botState.activityLog.slice(0, 50)) {
                const logDiv = document.createElement('div');
                logDiv.className = `log-entry log-${entry.type}`;
                logDiv.innerHTML = `
                    <span class="log-timestamp">[${entry.timestamp}]</span>
                    <span class="log-message">${entry.message}</span>
                `;
                logEl.appendChild(logDiv);
            }
        }
        
        async function startBot() {
            const response = await fetch('/api/start', { method: 'POST' });
            if (response.ok) {
                botState.running = true;
                updateDashboard();
            }
        }
        
        async function stopBot() {
            const response = await fetch('/api/stop', { method: 'POST' });
            if (response.ok) {
                botState.running = false;
                updateDashboard();
            }
        }
        
        async function resetBot() {
            const response = await fetch('/api/reset', { method: 'POST' });
            if (response.ok) {
                botState.balance = 50;
                botState.totalProfit = 0;
                botState.totalTrades = 0;
                botState.trades = [];
                botState.dailyProfit = 0;
                updateDashboard();
            }
        }
        
        async function scanMarkets() {
            const response = await fetch('/api/scan-markets', { method: 'POST' });
            if (response.ok) {
                console.log('Scan triggered');
            }
        }
        
        // Initialize
        connectWebSocket();
        
        // Fetch initial status
        fetch('/api/status')
            .then(r => r.json())
            .then(data => {
                botState = { ...botState, ...data };
                updateDashboard();
            });
    </script>
</body>
</html>
