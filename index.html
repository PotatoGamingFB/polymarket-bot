<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Polymarket Arbitrage Bot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #00d4ff;
      --secondary: #ff006e;
      --accent: #ffbe0b;
      --dark-bg: #0a0e27;
      --card-bg: #1a1f3a;
      --text-light: #e0e0e0;
      --text-muted: #8b8b9e;
      --success: #00d97e;
      --danger: #ff3860;
      --warning: #ffb800;
    }

    body {
      font-family: 'Sohne', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--dark-bg) 0%, #0f1330 100%);
      color: var(--text-light);
      min-height: 100vh;
      padding: 15px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
      padding-bottom: 12px;
      border-bottom: 2px solid rgba(0, 212, 255, 0.2);
      gap: 20px;
      flex-wrap: wrap;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .title-icon {
      font-size: 28px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 9px 18px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .btn-start {
      background: var(--success);
      color: var(--dark-bg);
    }

    .btn-start:hover {
      background: #00e89d;
      transform: translateY(-2px);
    }

    .btn-stop {
      background: var(--danger);
      color: white;
    }

    .btn-stop:hover {
      background: #ff5a7a;
      transform: translateY(-2px);
    }

    .btn-reset {
      background: var(--text-muted);
      color: var(--dark-bg);
    }

    .btn-reset:hover {
      background: var(--text-light);
    }

    .btn-disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .main-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 15px;
    }

    .metrics-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .metric-card {
      background: var(--card-bg);
      border: 1px solid rgba(0, 212, 255, 0.1);
      border-radius: 10px;
      padding: 16px;
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .metric-card:hover {
      border-color: rgba(0, 212, 255, 0.3);
      transform: translateY(-2px);
    }

    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--secondary));
    }

    .metric-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .metric-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      font-family: 'JetBrains Mono', monospace;
    }

    .metric-positive {
      color: var(--success);
    }

    .metric-negative {
      color: var(--danger);
    }

    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      animation: status-pulse 2s ease-in-out infinite;
    }

    .status-running {
      background: var(--success);
    }

    .status-stopped {
      background: var(--text-muted);
      animation: none;
    }

    @keyframes status-pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(0, 217, 126, 0.7); }
      50% { box-shadow: 0 0 0 8px rgba(0, 217, 126, 0); }
    }

    .activity-feed {
      background: var(--card-bg);
      border: 1px solid rgba(0, 212, 255, 0.1);
      border-radius: 10px;
      padding: 16px;
      height: 300px;
      display: flex;
      flex-direction: column;
    }

    .activity-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-light);
    }

    .activity-log {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
    }

    .activity-item {
      padding: 8px;
      background: rgba(0, 212, 255, 0.05);
      border-left: 3px solid var(--primary);
      border-radius: 4px;
      animation: slideIn 0.3s ease;
    }

    .activity-item.trade {
      border-left-color: var(--success);
      background: rgba(0, 217, 126, 0.05);
    }

    .activity-item.scan {
      border-left-color: var(--accent);
      background: rgba(255, 190, 11, 0.05);
    }

    .activity-item.error {
      border-left-color: var(--danger);
      background: rgba(255, 56, 96, 0.05);
    }

    .activity-time {
      color: var(--text-muted);
      font-size: 11px;
      margin-right: 8px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .trades-section {
      background: var(--card-bg);
      border: 1px solid rgba(0, 212, 255, 0.1);
      border-radius: 10px;
      padding: 16px;
      overflow-x: auto;
    }

    .trades-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text-light);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    th {
      background: rgba(0, 212, 255, 0.05);
      padding: 10px;
      text-align: left;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.1);
    }

    td {
      padding: 10px;
      border-bottom: 1px solid rgba(0, 212, 255, 0.05);
      font-family: 'JetBrains Mono', monospace;
    }

    tr:hover {
      background: rgba(0, 212, 255, 0.05);
    }

    .trade-profit {
      font-weight: 600;
      color: var(--success);
    }

    .trade-loss {
      font-weight: 600;
      color: var(--danger);
    }

    .market-name {
      color: var(--primary);
      font-weight: 600;
      max-width: 250px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .empty-state {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-size: 12px;
    }

    .activity-log::-webkit-scrollbar {
      width: 6px;
    }

    .activity-log::-webkit-scrollbar-track {
      background: rgba(0, 212, 255, 0.05);
    }

    .activity-log::-webkit-scrollbar-thumb {
      background: rgba(0, 212, 255, 0.2);
      border-radius: 3px;
    }

    .activity-log::-webkit-scrollbar-thumb:hover {
      background: rgba(0, 212, 255, 0.3);
    }

    @media (max-width: 1024px) {
      .main-layout {
        grid-template-columns: 1fr;
      }

      .activity-feed {
        height: 200px;
      }
    }

    @media (max-width: 768px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .controls {
        width: 100%;
      }

      button {
        flex: 1;
        min-width: 80px;
      }

      .metrics-grid {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 11px;
      }

      td, th {
        padding: 8px;
      }

      .market-name {
        max-width: 150px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="header">
      <div class="title">
        <span class="title-icon">🤖</span>
        <div>Polymarket Bot</div>
      </div>
      <div class="controls">
        <button id="start-btn" class="btn-start">▶ Start</button>
        <button id="stop-btn" class="btn-stop btn-disabled" disabled>⏹ Stop</button>
        <button id="reset-btn" class="btn-reset">↻ Reset</button>
      </div>
    </div>

    <!-- Main Layout -->
    <div class="main-layout">
      <!-- Left: Metrics -->
      <div>
        <div class="metrics-grid">
          <div class="metric-card">
            <div class="metric-label">Balance</div>
            <div class="metric-value" id="balance">$50.00</div>
          </div>

          <div class="metric-card">
            <div class="metric-label">Profit</div>
            <div class="metric-value metric-positive" id="profit">$0.00</div>
          </div>

          <div class="metric-card">
            <div class="metric-label">ROI</div>
            <div class="metric-value metric-positive" id="roi">0.00%</div>
          </div>

          <div class="metric-card">
            <div class="metric-label">Trades</div>
            <div class="metric-value" id="trades-count">0</div>
            <div style="font-size: 11px; color: var(--text-muted); margin-top: 4px;">
              <span class="status-indicator status-stopped" id="status-indicator"></span>
              <span id="bot-status">Stopped</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Right: Activity Feed -->
      <div class="activity-feed">
        <div class="activity-title">Live Activity</div>
        <div class="activity-log" id="activity-log">
          <div class="activity-item">
            <span class="activity-time">--:--:--</span>
            <span>Waiting to start...</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Trades Table -->
    <div class="trades-section">
      <div class="trades-title">Recent Trades</div>
      <table id="trades-table">
        <thead>
          <tr>
            <th>Time</th>
            <th>Market</th>
            <th>Entry</th>
            <th>Exit</th>
            <th>Spread</th>
            <th>Profit</th>
            <th>ROI</th>
          </tr>
        </thead>
        <tbody id="trades-body">
          <tr>
            <td colspan="7" class="empty-state">No trades yet. Start the bot to begin monitoring.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  
  <script>
    let botRunning = false;
    let tradeHistory = [];
    let scanCount = 0;

    const startBtn = document.getElementById('start-btn');
    const stopBtn = document.getElementById('stop-btn');
    const resetBtn = document.getElementById('reset-btn');
    const balanceEl = document.getElementById('balance');
    const profitEl = document.getElementById('profit');
    const roiEl = document.getElementById('roi');
    const tradesCountEl = document.getElementById('trades-count');
    const botStatusEl = document.getElementById('bot-status');
    const statusIndicator = document.getElementById('status-indicator');
    const tradesBody = document.getElementById('trades-body');
    const activityLog = document.getElementById('activity-log');

    function formatCurrency(value) {
      return new Intl.NumberFormat('en-CA', { style: 'currency', currency: 'CAD' }).format(value);
    }

    function formatTime(date) {
      return new Date(date).toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }

    function addActivity(message, type = 'info') {
      const time = new Date().toLocaleTimeString('en-CA', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const item = document.createElement('div');
      item.className = `activity-item ${type}`;
      item.innerHTML = `<span class="activity-time">${time}</span><span>${message}</span>`;
      
      activityLog.insertBefore(item, activityLog.firstChild);
      
      // Keep only last 50 items
      while (activityLog.children.length > 50) {
        activityLog.removeChild(activityLog.lastChild);
      }
    }

    function updateMetrics(balance, totalProfit, totalTrades) {
      balanceEl.textContent = formatCurrency(balance);
      profitEl.textContent = formatCurrency(totalProfit);
      
      const roi = ((totalProfit / 50) * 100).toFixed(2);
      roiEl.textContent = `${roi}%`;
      roiEl.className = roi >= 0 ? 'metric-positive' : 'metric-negative';
      
      tradesCountEl.textContent = totalTrades;
    }

    function updateTradesTable(trades) {
      if (trades.length === 0) {
        tradesBody.innerHTML = '<tr><td colspan="7" class="empty-state">No trades yet</td></tr>';
        return;
      }

      tradesBody.innerHTML = trades
        .slice(0, 10)
        .map((trade) => `
          <tr>
            <td>${formatTime(trade.timestamp)}</td>
            <td><span class="market-name">${trade.marketName}</span></td>
            <td>${trade.entryPrice.toFixed(4)}</td>
            <td>${trade.exitPrice.toFixed(4)}</td>
            <td>${trade.spreadExploited.toFixed(2)}%</td>
            <td class="${trade.profit >= 0 ? 'trade-profit' : 'trade-loss'}">
              ${formatCurrency(trade.profit)}
            </td>
            <td class="${trade.profitPercent >= 0 ? 'trade-profit' : 'trade-loss'}">
              ${trade.profitPercent.toFixed(2)}%
            </td>
          </tr>
        `)
        .join('');
    }

    startBtn.addEventListener('click', async () => {
      const response = await fetch('/api/start', { method: 'POST' });
      if (response.ok) {
        botRunning = true;
        startBtn.disabled = true;
        startBtn.classList.add('btn-disabled');
        stopBtn.disabled = false;
        stopBtn.classList.remove('btn-disabled');
        botStatusEl.textContent = 'Running';
        statusIndicator.classList.remove('status-stopped');
        statusIndicator.classList.add('status-running');
        addActivity('🚀 Bot started - monitoring markets', 'scan');
      }
    });

    stopBtn.addEventListener('click', async () => {
      const response = await fetch('/api/stop', { method: 'POST' });
      if (response.ok) {
        botRunning = false;
        startBtn.disabled = false;
        startBtn.classList.remove('btn-disabled');
        stopBtn.disabled = true;
        stopBtn.classList.add('btn-disabled');
        botStatusEl.textContent = 'Stopped';
        statusIndicator.classList.add('status-stopped');
        statusIndicator.classList.remove('status-running');
        addActivity('⏹ Bot stopped', 'scan');
      }
    });

    resetBtn.addEventListener('click', async () => {
      const response = await fetch('/api/reset', { method: 'POST' });
      if (response.ok) {
        tradeHistory = [];
        updateMetrics(50, 0, 0);
        updateTradesTable([]);
        addActivity('↻ Bot reset to $50', 'scan');
      }
    });

    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const ws = new WebSocket(`${protocol}//${window.location.host}`);

      ws.onopen = () => {
        addActivity('✅ Connected to server', 'scan');
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);

        if (data.type === 'initial_state') {
          updateMetrics(data.balance, data.totalProfit, data.totalTrades);
          updateTradesTable(data.trades);
          tradeHistory = data.trades;
          if (data.running) {
            botRunning = true;
            startBtn.disabled = true;
            startBtn.classList.add('btn-disabled');
            stopBtn.disabled = false;
            stopBtn.classList.remove('btn-disabled');
            botStatusEl.textContent = 'Running';
            statusIndicator.classList.remove('status-stopped');
            statusIndicator.classList.add('status-running');
          }
        } else if (data.type === 'new_trade') {
          tradeHistory.unshift(data.trade);
          updateMetrics(data.balance, data.totalProfit, data.totalTrades);
          updateTradesTable(tradeHistory);
          addActivity(`💰 Trade executed: ${data.trade.marketName.substring(0, 40)} - Profit: ${formatCurrency(data.trade.profit)}`, 'trade');
        } else if (data.type === 'market_update') {
          if (botRunning) {
            scanCount++;
            if (scanCount % 10 === 0) {
              addActivity(`🔍 Scanned markets... (${data.totalTrades} trades)`, 'scan');
              scanCount = 0;
            }
          }
        } else if (data.type === 'bot_started') {
          botRunning = true;
          addActivity('🚀 Bot started', 'scan');
        } else if (data.type === 'bot_stopped') {
          botRunning = false;
          addActivity('⏹ Bot stopped', 'scan');
        } else if (data.type === 'bot_reset') {
          tradeHistory = [];
          addActivity('↻ Bot reset', 'scan');
        }
      };

      ws.onclose = () => {
        addActivity('❌ Disconnected', 'error');
        setTimeout(connectWebSocket, 3000);
      };

      ws.onerror = (error) => {
        addActivity('⚠️ Connection error', 'error');
      };
    }

    document.addEventListener('DOMContentLoaded', () => {
      connectWebSocket();
      addActivity('✨ Dashboard loaded', 'scan');
    });
  </script>
</body>
</html>
